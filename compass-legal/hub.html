<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass Hub - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="hub-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="img/logo.jpg" alt="Compass Logo" class="sidebar-logo">
            <span style="font-weight: 600; font-size: 1.1rem; color: var(--color-primary-dark);">Compass Hub</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active">📁 Casos Activos</a></li>
            <li><a href="#">🗄️ Historial</a></li>
            <li><a href="#">👥 Clientes</a></li>
            <li><a href="#">⚙️ Configuración</a></li>
        </ul>
        <div style="padding: 1.5rem; text-align: center; border-top: 1px solid #EAEAEA;">
            <a href="login.html" style="color: var(--color-text-light); text-decoration: none; font-size: 0.9rem;">Cerrar Sesión &rarr;</a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-search">
                <input type="text" id="searchInput" placeholder="Buscar por nombre o email...">
            </div>
            <div class="topbar-profile">
                <span>Ximena Hernández</span>
                <div class="avatar">XH</div>
            </div>
        </header>

        <!-- CONTENT AREA -->
        <div class="content-area">
            <div class="page-header">
                <h1>Gestión de Casos</h1>
                <div>
                    <button class="btn btn-outline" style="padding: 0.6rem 1.2rem; margin-right: 10px;" id="exportBtn">⬇️ Exportar CSV</button>
                    <button class="btn btn-primary" style="padding: 0.6rem 1.2rem;" id="newCaseBtn">➕ Nuevo Caso</button>
                </div>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="data-table" id="casesTable">
                        <thead>
                            <tr>
                                <th>Nombre del Cliente</th>
                                <th>Email</th>
                                <th>Categoría</th>
                                <th>Estatus</th>
                                <th>Expediente</th>
                                <th>Comentarios / Última Acción</th>
                            </tr>
                        </thead>
                        <tbody id="casesTableBody">
                            <!-- JS WILL POPULATE THIS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- NEW CASE MODAL -->
    <div class="modal-overlay" id="newCaseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Aperturar Nuevo Caso</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="newCaseForm">
                    <div class="form-group">
                        <label>Nombre del Cliente</label>
                        <input type="text" id="caseName" required placeholder="Ej. John Doe">
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="caseEmail" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Categoría del Trámite</label>
                        <select id="caseCategory">
                            <option value="Residencia Temporal">Residencia Temporal</option>
                            <option value="Fideicomiso (Bienes Raíces)">Fideicomiso (Bienes Raíces)</option>
                            <option value="Cancelación TIP (Barco)">Cancelación TIP (Barco)</option>
                            <option value="Creación LLC">Creación LLC</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estatus Inicial</label>
                        <select id="caseStatus">
                            <option value="nuevo">Nuevo</option>
                            <option value="curso">En Curso</option>
                            <option value="pausa">En Pausa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Enlace de Carpeta (Drive)</label>
                        <input type="url" id="caseFolder" placeholder="https://drive.google.com/drive/folders/...">
                    </div>
                    <div class="form-group">
                        <label>Comentarios Iniciales</label>
                        <textarea id="caseComments" rows="3" placeholder="Detalles o documentos pendientes..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelModalBtn" style="padding: 0.6rem 1.2rem;">Cancelar</button>
                <button class="btn btn-primary" id="saveCaseBtn" style="padding: 0.6rem 1.2rem;">Guardar Caso</button>
            </div>
        </div>
    </div>

    <!-- MAIN JS -->
    <script src="js/hub.js"></script>
</body>
</html>
