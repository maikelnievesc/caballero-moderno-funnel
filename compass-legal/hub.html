<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass Hub - Dashboard</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="hub-body">

    <!-- SIDEBAR -->
    <aside class="sidebar" data-aos="fade-right" data-aos-duration="600">
        <div class="sidebar-header">
            <img src="img/logo.jpg" alt="Compass Logo" class="sidebar-logo">
            <span style="font-weight: 600; font-size: 1.1rem; color: var(--color-primary-dark);">Compass Hub</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                Casos Activos</a></li>
            <li><a href="#">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Historial</a></li>
            <li><a href="#">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Clientes</a></li>
            <li><a href="#">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Configuración</a></li>
        </ul>
        <div style="padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05);">
            <a href="login.html" style="color: #64748B; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 8px;">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Cerrar Sesión</a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- TOPBAR -->
        <header class="topbar" data-aos="fade-down" data-aos-duration="500">
            <div class="topbar-search">
                <input type="text" id="searchInput" placeholder="Buscar por nombre o email...">
            </div>
            <div class="topbar-profile">
                <span>Ximena Hernández</span>
                <div class="avatar">XH</div>
            </div>
        </header>

        <!-- CONTENT AREA -->
        <div class="content-area">
            <div class="content-wrapper">
                <div class="page-header" data-aos="fade-up" data-aos-delay="100">
                    <h1>Gestión de Casos</h1>
                    <div>
                        <button class="btn btn-outline" style="margin-right: 10px;" id="exportBtn">Exportar CSV</button>
                        <button class="btn btn-primary" id="newCaseBtn">Nuevo Caso</button>
                    </div>
                </div>

                <div class="card" data-aos="fade-up" data-aos-delay="200">
                    <div class="table-responsive">
                        <table class="data-table" id="casesTable">
                            <thead>
                                <tr>
                                    <th>Nombre del Cliente</th>
                                    <th>Email</th>
                                    <th>Categoría</th>
                                    <th>Estatus</th>
                                    <th>Expediente</th>
                                    <th>Última Acción</th>
                                </tr>
                            </thead>
                            <tbody id="casesTableBody">
                                <!-- JS WILL POPULATE THIS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- NEW CASE MODAL -->
    <div class="modal-overlay" id="newCaseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Aperturar Nuevo Caso</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="newCaseForm">
                    <div class="form-group">
                        <label>Nombre del Cliente</label>
                        <input type="text" id="caseName" required placeholder="Ej. John Doe">
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="caseEmail" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Categoría del Trámite</label>
                        <select id="caseCategory">
                            <option value="Residencia Temporal">Residencia Temporal</option>
                            <option value="Fideicomiso (Bienes Raíces)">Fideicomiso (Bienes Raíces)</option>
                            <option value="Cancelación TIP (Barco)">Cancelación TIP (Barco)</option>
                            <option value="Creación LLC">Creación LLC</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estatus Inicial</label>
                        <select id="caseStatus">
                            <option value="nuevo">Nuevo</option>
                            <option value="curso">En Curso</option>
                            <option value="pausa">En Pausa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Enlace de Carpeta (Drive)</label>
                        <input type="url" id="caseFolder" placeholder="https://drive.google.com/drive/folders/...">
                    </div>
                    <div class="form-group">
                        <label>Comentarios Iniciales</label>
                        <textarea id="caseComments" rows="3" placeholder="Detalles o documentos pendientes..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelModalBtn" style="padding: 0.6rem 1.2rem;">Cancelar</button>
                <button class="btn btn-primary" id="saveCaseBtn" style="padding: 0.6rem 1.2rem;">Guardar Caso</button>
            </div>
        </div>
    </div>

    <!-- MAIN JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>
    <script src="js/hub.js"></script>
</body>
</html>
